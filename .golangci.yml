run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/ademarthiago/payment-gateway

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
